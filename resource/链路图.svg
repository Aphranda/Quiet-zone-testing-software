<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">开关切换箱链路图</title>
  <desc id="desc">微波暗室静区测试系统的开关切换箱链路示意图，包含 H、V、DUT、VNA1、VNA2、SG、SA、SW1 至 SW6 以及两级放大器连接关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowActive" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d25"/>
    </marker>
    <style>
      .background { fill: #ffffff; }
      .title { font: 700 28px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .label { font: 700 20px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .small { font: 700 17px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .pin { font: 700 18px "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .wire { fill: none; stroke: #1f2937; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .wirePlain { fill: none; stroke: #1f2937; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .activeWire { fill: none; stroke: #e11d25; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowActive); }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 3; rx: 2; }
      .switchBox { fill: #ffffff; stroke: #1f2937; stroke-width: 3; rx: 2; }
      .switchBoxActive { fill: #ff1f1f; stroke: #111827; stroke-width: 3; rx: 2; }
      .contact { fill: #111827; }
      .contactHot { fill: #e11d25; stroke: #111827; stroke-width: 1.5; }
      .portIn { fill: #22c7ee; stroke: #111827; stroke-width: 3; rx: 2; }
      .portOut { fill: #ff1f1f; stroke: #e11d25; stroke-width: 3; rx: 2; }
      .ampOrange { fill: #f7a15a; stroke: #1f2937; stroke-width: 3; }
      .ampGreen { fill: #24c96b; stroke: #1f2937; stroke-width: 3; }
      .panel { fill: none; stroke: #111827; stroke-width: 3; stroke-dasharray: 28 18; }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1100" height="760"/>
  <text class="title" x="550" y="42" text-anchor="middle">开关切换箱</text>
  <rect class="panel" x="82" y="86" width="966" height="580"/>

  <!-- Left polarization inputs -->
  <text class="label" x="32" y="143" text-anchor="middle">H</text>
  <rect class="portIn" x="55" y="130" width="42" height="12"/>
  <text class="label" x="32" y="200" text-anchor="middle">V</text>
  <rect class="portIn" x="55" y="187" width="42" height="12"/>
  <line class="wire" x1="97" y1="136" x2="174" y2="136"/>
  <line class="wire" x1="97" y1="193" x2="174" y2="193"/>

  <!-- SW1 -->
  <rect class="switchBoxActive" x="184" y="118" width="62" height="78"/>
  <text class="small" x="215" y="229" text-anchor="middle">SW1</text>
  <text class="pin" x="158" y="126">2</text>
  <text class="pin" x="158" y="207">1</text>
  <rect class="contactHot" x="174" y="128" width="22" height="8"/>
  <rect class="contactHot" x="174" y="185" width="22" height="8"/>
  <rect class="contactHot" x="236" y="157" width="24" height="8"/>
  <line class="wirePlain" x1="196" y1="132" x2="260" y2="161"/>
  <line class="wirePlain" x1="196" y1="189" x2="236" y2="189"/>
  <line class="wire" x1="260" y1="161" x2="334" y2="161"/>

  <!-- SW2 and orange amplifier loop -->
  <rect class="switchBox" x="344" y="118" width="64" height="78"/>
  <text class="small" x="376" y="218" text-anchor="middle">SW2</text>
  <text class="pin" x="414" y="126">2</text>
  <text class="pin" x="414" y="208">1</text>
  <rect class="contact" x="397" y="128" width="28" height="8"/>
  <rect class="contact" x="397" y="185" width="28" height="8"/>
  <rect class="contact" x="330" y="157" width="28" height="8"/>
  <line class="wirePlain" x1="358" y1="161" x2="397" y2="189"/>
  <line class="wirePlain" x1="397" y1="132" x2="397" y2="189"/>
  <polyline class="wire" points="425,132 574,132 574,226"/>
  <rect class="box" x="535" y="226" width="78" height="86"/>
  <polygon class="ampOrange" points="553,246 595,246 574,296"/>
  <polyline class="wirePlain" points="574,312 574,388 425,388 425,392"/>

  <!-- SW3 -->
  <rect class="switchBox" x="344" y="344" width="64" height="78"/>
  <text class="small" x="318" y="365" text-anchor="middle">SW3</text>
  <text class="pin" x="396" y="330">1</text>
  <text class="pin" x="396" y="438">2</text>
  <rect class="contact" x="397" y="356" width="28" height="8"/>
  <rect class="contact" x="397" y="412" width="28" height="8"/>
  <rect class="contact" x="330" y="383" width="28" height="8"/>
  <line class="wirePlain" x1="358" y1="387" x2="397" y2="416"/>
  <polyline class="wire" points="425,416 574,416 574,312"/>
  <polyline class="wire" points="425,356 425,190"/>

  <!-- SW6 and lower instruments -->
  <rect class="switchBox" x="220" y="480" width="168" height="74"/>
  <text class="small" x="248" y="516" text-anchor="middle">SW6</text>
  <text class="pin" x="220" y="566">1</text>
  <text class="pin" x="267" y="566">2</text>
  <text class="pin" x="314" y="566">3</text>
  <text class="pin" x="361" y="566">4</text>
  <rect class="contact" x="238" y="530" width="10" height="38"/>
  <rect class="contact" x="284" y="530" width="10" height="38"/>
  <rect class="contact" x="330" y="530" width="10" height="38"/>
  <rect class="contact" x="376" y="530" width="10" height="38"/>
  <line class="wirePlain" x1="304" y1="508" x2="330" y2="554"/>
  <polyline class="wire" points="344,422 304,422 304,480"/>
  <polyline class="wirePlain" points="388,522 420,522 420,600 592,600 592,450"/>
  <polyline class="wirePlain" points="332,554 332,600 592,600"/>
  <line class="wire" x1="244" y1="554" x2="244" y2="646"/>
  <line class="wire" x1="290" y1="554" x2="290" y2="646"/>
  <line class="wire" x1="336" y1="554" x2="336" y2="646"/>
  <rect class="portOut" x="238" y="646" width="12" height="48"/>
  <rect class="portOut" x="284" y="646" width="12" height="48"/>
  <rect class="portOut" x="330" y="646" width="12" height="48"/>
  <text class="label" x="244" y="728" text-anchor="middle">VNA1</text>
  <text class="label" x="290" y="728" text-anchor="middle">VNA2</text>
  <text class="label" x="336" y="728" text-anchor="middle">SG</text>

  <!-- DUT, green amplifier, SW4 and SW5 -->
  <text class="label" x="916" y="48" text-anchor="middle">DUT</text>
  <rect class="portIn" x="910" y="70" width="12" height="42"/>
  <line class="wire" x1="916" y1="112" x2="916" y2="184"/>
  <rect class="box" x="878" y="184" width="78" height="82"/>
  <polygon class="ampGreen" points="894,202 938,202 916,250"/>
  <line class="wire" x1="916" y1="266" x2="916" y2="334"/>

  <rect class="switchBox" x="880" y="334" width="72" height="76"/>
  <text class="small" x="933" y="380" text-anchor="middle">SW4</text>
  <text class="pin" x="872" y="414">1</text>
  <text class="pin" x="965" y="414">2</text>
  <rect class="contact" x="890" y="386" width="10" height="32"/>
  <rect class="contact" x="940" y="386" width="10" height="32"/>
  <rect class="contact" x="910" y="318" width="12" height="34"/>
  <line class="wirePlain" x1="916" y1="352" x2="896" y2="402"/>
  <polyline class="wirePlain" points="896,418 896,522 592,522 592,600"/>
  <polyline class="wire" points="946,418 946,540"/>

  <rect class="switchBox" x="896" y="540" width="76" height="78"/>
  <text class="small" x="909" y="582" text-anchor="middle">SW5</text>
  <text class="pin" x="872" y="562">1</text>
  <text class="pin" x="962" y="562">2</text>
  <rect class="contact" x="910" y="532" width="12" height="40"/>
  <rect class="contact" x="954" y="532" width="12" height="40"/>
  <rect class="contact" x="928" y="610" width="12" height="34"/>
  <line class="wirePlain" x1="962" y1="560" x2="934" y2="626"/>
  <line class="wire" x1="934" y1="644" x2="934" y2="646"/>
  <rect class="portOut" x="928" y="646" width="12" height="48"/>
  <text class="label" x="934" y="728" text-anchor="middle">SA</text>

  <!-- Cross links from the left network to SW5/SW4 -->
  <polyline class="wirePlain" points="388,522 592,522 592,450 896,450 896,540"/>
  <polyline class="wire" points="574,388 896,388"/>
</svg>
