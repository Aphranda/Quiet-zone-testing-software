<circle class="junctionBlue" cx="896" cy="540" r="4.5"/>
<text class="hint" x="92" y="710" text-anchor="start">说明：器件位置尽量贴近原始图；SW1-SW5 为一出二开关，SW6 为一出四开关；开关边缘的小突起是端子。</text>
</svg>
